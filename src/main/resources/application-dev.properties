# Development Database Configuration
spring.datasource.url=${DEV_DB_URL}
spring.datasource.username=${DEV_DB_USERNAME}
spring.datasource.password=${DEV_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Configuration
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=NudgeHikariPool

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Transaction Isolation Level
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Request Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL}

# Frontend URL used for links that need to land on the web app
# (e.g. the "Go to Login" button on the email-verification result page).
nudge.frontend-url=${FRONTEND_URL}

# Google sign-in: OAuth 2.0 client ID. Issue ID tokens from
# https://console.cloud.google.com/apis/credentials. The frontend uses
# the same value as VITE_GOOGLE_CLIENT_ID.
nudge.google.client-id=${GOOGLE_CLIENT_ID:}

# Java Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${DEV_EMAIL_USERNAME}
spring.mail.password=${DEV_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary creds optional in dev — MediaService no-ops cleanup if unset.
# Set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in .env to enable.
