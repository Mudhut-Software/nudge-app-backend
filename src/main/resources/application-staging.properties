# Staging Database Configuration
spring.datasource.url=${STAGING_DB_URL}
spring.datasource.username=${STAGING_DB_USERNAME}
spring.datasource.password=${STAGING_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Frontend URL used for links that need to land on the web app
# (e.g. the "Go to Login" button on the email-verification result page).
nudge.frontend-url=${FRONTEND_URL:}

# Google sign-in client ID (set GOOGLE_CLIENT_ID in env).
nudge.google.client-id=${GOOGLE_CLIENT_ID:}

# Cloudinary credentials required in staging
nudge.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
nudge.cloudinary.api-key=${CLOUDINARY_API_KEY}
nudge.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
